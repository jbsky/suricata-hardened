---
# Docker Compose for local testing
# NOTE: NFQUEUE mode requires host network + CAP_NET_ADMIN.
# For local testing without NFQUEUE, Suricata starts in pcap mode on a dummy interface.

x-common-security: &common-security
  read_only: false
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  ulimits:
    nofile: { soft: 65536, hard: 65536 }
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: "50m", max-file: "5" }

services:
  suricata:
    build:
      context: .
      dockerfile: Dockerfile
    image: suricata-hardened:latest
    container_name: suricata-hardened
    <<: *common-security
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    # Override CMD for local testing (no NFQUEUE available without host network)
    command: ["suricata", "--pcap=eth0", "-c", "/etc/suricata/suricata.yaml"]
    volumes:
      - ./conf/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - suricata-logs:/var/log/suricata
      - suricata-run:/var/run/suricata
    tmpfs:
      - /tmp:size=256m,mode=1777,nodev,nosuid,noexec
    healthcheck:
      test: ["/usr/local/bin/init", "--healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  suricata-logs:
  suricata-run:
