# =====================================================================
#  Pipeline GitLab CI - Suricata Hardened
#  Multi-arch via buildx, cosign signing, Trivy scan
# =====================================================================

stages:
  - lint
  - build
  - sign
  - scan
  - release

variables:
  DOCKER_BUILDKIT: "1"
  REGISTRY: $CI_REGISTRY
  IMAGE_NAMESPACE: $CI_PROJECT_PATH
  COSIGN_EXPERIMENTAL: "1"
  PLATFORMS: "linux/amd64"

default:
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker info >/dev/null
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      if [ -n "$DOCKERHUB_TOKEN" ]; then
        echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin docker.io
      fi

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

# ---------- LINT ----------------------------------------------------
hadolint:
  stage: lint
  image: hadolint/hadolint:latest-alpine
  before_script: []
  services: []
  script:
    - hadolint --failure-threshold warning Dockerfile
    - hadolint --failure-threshold warning updater/Dockerfile

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  before_script: []
  services: []
  script:
    - shellcheck scripts/*.sh

# ---------- BUILD ---------------------------------------------------
.build-template: &build-template
  stage: build
  script:
    - apk add --no-cache git jq
    - |
      if echo "${PLATFORMS}" | grep -qv '^linux/amd64$'; then
        docker run --privileged --rm tonistiigi/binfmt --install all
      fi
    - docker context create tls-ctx
    - |
      mkdir -p /tmp/buildkit
      cat > /tmp/buildkit/buildkitd.toml <<TOML
      [registry."${CI_REGISTRY}"]
        ca = ["/etc/ssl/certs/ca-certificates.crt"]
      TOML
    - |
      docker buildx create --use --name builder \
        --config /tmp/buildkit/buildkitd.toml \
        --driver-opt network=host \
        --driver-opt "env.http_proxy=${http_proxy:-}" \
        --driver-opt "env.https_proxy=${https_proxy:-}" \
        --driver-opt "env.HTTP_PROXY=${HTTP_PROXY:-}" \
        --driver-opt "env.HTTPS_PROXY=${HTTPS_PROXY:-}" \
        --driver-opt "env.no_proxy=${BUILDKIT_NO_PROXY:-}" \
        --driver-opt "env.NO_PROXY=${BUILDKIT_NO_PROXY:-}" \
        tls-ctx
    - |
      UPSTREAM_VERSION=$(jq -r ".\"${VERSION_KEY}\"" versions.json)
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG="${UPSTREAM_VERSION}"
        EXTRA_TAGS="-t ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:latest -t ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${CI_COMMIT_TAG}"
      else
        TAG="${UPSTREAM_VERSION}"
        EXTRA_TAGS="-t ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:latest"
      fi
    - |
      docker buildx build \
        --platform "${PLATFORMS}" \
        --provenance=mode=max \
        --sbom=true \
        --build-arg http_proxy="${http_proxy:-}" \
        --build-arg https_proxy="${https_proxy:-}" \
        --build-arg HTTP_PROXY="${HTTP_PROXY:-}" \
        --build-arg HTTPS_PROXY="${HTTPS_PROXY:-}" \
        --build-arg no_proxy="${no_proxy:-}" \
        --build-arg NO_PROXY="${NO_PROXY:-}" \
        --secret id=ca-certs,src=/etc/ssl/certs/ca-certificates.crt \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --cache-from type=registry,ref=${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:buildcache \
        --cache-to   type=registry,ref=${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:buildcache,mode=max \
        -t ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${TAG} \
        ${EXTRA_TAGS} \
        --push \
        ./${BUILD_CONTEXT}
    - docker buildx imagetools inspect ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${TAG} | tee image-digest-${IMAGE_NAME}.txt
  artifacts:
    paths:
      - image-digest-*.txt
    expire_in: 30 days

build:suricata:
  <<: *build-template
  variables:
    IMAGE_NAME: suricata-hardened
    BUILD_CONTEXT: "."
    VERSION_KEY: suricata

build:updater:
  <<: *build-template
  variables:
    IMAGE_NAME: suricata-updater
    BUILD_CONTEXT: updater
    VERSION_KEY: suricata

# ---------- SIGN (cosign keyless via OIDC GitLab) -------------------
.sign-template: &sign-template
  stage: sign
  image: alpine:3.21
  before_script: []
  services: []
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - apk add --no-cache cosign
    - DIGEST=$(grep -o 'sha256:[a-f0-9]*' image-digest-${IMAGE_NAME}.txt | head -1)
    - cosign sign --yes ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}@${DIGEST}
  allow_failure: true

sign:suricata:
  <<: *sign-template
  needs: ["build:suricata"]
  variables:
    IMAGE_NAME: suricata-hardened

sign:updater:
  <<: *sign-template
  needs: ["build:updater"]
  variables:
    IMAGE_NAME: suricata-updater

# ---------- SCAN ----------------------------------------------------
.scan-template: &scan-template
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script: []
  services: []
  script:
    - export TRIVY_USERNAME="$CI_REGISTRY_USER"
    - export TRIVY_PASSWORD="$CI_REGISTRY_PASSWORD"
    - export SSL_CERT_FILE="/etc/ssl/certs/ca-certificates.crt"
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed
        --format sarif --output trivy-${IMAGE_NAME}.sarif
        ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:latest
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed
        ${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:latest
  artifacts:
    paths:
      - trivy-*.sarif
    reports:
      sast: trivy-${IMAGE_NAME}.sarif
    expire_in: 90 days
  allow_failure: true

scan:suricata:
  <<: *scan-template
  needs: ["build:suricata"]
  variables:
    IMAGE_NAME: suricata-hardened

scan:updater:
  <<: *scan-template
  needs: ["build:updater"]
  variables:
    IMAGE_NAME: suricata-updater

# ---------- RELEASE (sur tag) ---------------------------------------
release:tarball:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  image: alpine:3.21
  before_script: []
  services: []
  script:
    - apk add --no-cache tar gzip coreutils
    - mkdir -p dist
    - tar --exclude='.git' --exclude='dist' --exclude='.env'
          --transform "s,^,suricata-hardened-${CI_COMMIT_TAG}/,"
          -czf dist/suricata-hardened-${CI_COMMIT_TAG}.tar.gz .
    - cd dist && sha256sum suricata-hardened-${CI_COMMIT_TAG}.tar.gz > suricata-hardened-${CI_COMMIT_TAG}.tar.gz.sha256
  artifacts:
    paths:
      - dist/
    expire_in: never
